<div class="emergency-bar" id="emergency-bar">
  <div class="eb-inner">
    <div class="eb-pulse">
      <span class="pulse-dot"></span>
      <span class="eb-status">LIVE — Technicians Available Now</span>
    </div>
    <div class="eb-cta">
      <span class="eb-label">Emergency Line:</span>
      <a href="tel:{{ .Site.Params.phonePlain }}" class="eb-phone">{{ .Site.Params.phone }}</a>
    </div>
    <a href="tel:{{ .Site.Params.phonePlain }}" class="eb-btn">Call Now — Free Estimate</a>
  </div>
</div>
