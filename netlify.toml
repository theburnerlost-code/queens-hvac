[build]
  publish = "public"
  command = "hugo --minify"

[build.environment]
  HUGO_VERSION = "0.124.0"

# === REDIRECTS ===
[[redirects]]
  from = "/HVAC technician-queens/"
  to = "/"
  status = 301

[[redirects]]
  from = "/emergency-HVAC technician-queens/"
  to = "/"
  status = 301

[[redirects]]
  from = "/queens-HVAC technician/"
  to = "/"
  status = 301

# === SECURITY & PERFORMANCE HEADERS ===
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# === NETLIFY FORMS ===
# Forms are handled via Hugo template with data-netlify="true"
# No additional config needed — Netlify auto-detects on deploy
